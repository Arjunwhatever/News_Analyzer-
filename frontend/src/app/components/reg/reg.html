<!-- src/app/components/register/register.component.html -->
<div class="register-wrapper">
  <div class="bg-texture"></div>

  <div class="register-container">

    <!-- Logo -->
    <div class="logo-mark">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="9" width="36" height="1.5" fill="#c8c4b8"/>
        <rect x="12" y="14" width="28" height="1.5" fill="#c8c4b8"/>
        <polygon points="26,48 4,12 48,12" fill="none" stroke="#c8c4b8" stroke-width="1.5"/>
      </svg>
    </div>

    <h1 class="brand">vector.</h1>
    <p class="tagline">create an account</p>

    <!-- Error message -->
    <div class="error-msg" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <!-- Form -->
    <div class="form-group">
      <input
        type="email"
        class="form-input"
        placeholder="Email "
        [(ngModel)]="email"
        [disabled]="isLoading"
        (keyup.enter)="register()"
      />
    </div>

    <div class="form-group">
      <input
        type="password"
        class="form-input"
        placeholder="Password"
        [(ngModel)]="password"
        (ngModelChange)="onPasswordChange()"
        [disabled]="isLoading"
        (keyup.enter)="register()"
      />
      <!-- Password strength indicator -->
      <div class="password-strength-container" *ngIf="password">
        <div class="strength-bar">
          <div class="strength-fill" [style.width.%]="strengthPercent" [style.background]="strengthColor"></div>
        </div>
        <p class="strength-text" [style.color]="strengthColor">{{ strengthLabel }}</p>
      </div>
    </div>

    <div class="form-group">
      <input
        type="password"
        class="form-input"
        placeholder="Confirm password"
        [(ngModel)]="confirmPassword"
        [disabled]="isLoading"
        (keyup.enter)="register()"
      />
    </div>

    <button
      class="register-btn"
      [disabled]="isLoading"
      (click)="register()"
    >
      <span *ngIf="!isLoading">REGISTER</span>
      <span class="btn-loader" *ngIf="isLoading">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </span>
    </button>

    <p class="login-link">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>

  </div>
</div>
